<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAVpage</title>
<style>
	:root {
		--accent: #5b8cff;
		--bg: #0f1115;
		--bg2: #171a21;
		--card: #1c2029;
		--tile: #232834;
		--tile-h: #2c3340;
		--text: #e7eaf0;
		--muted: #8a93a6;
		--line: #2a2f3a;
		--bg-glow: #1a2030;                    /* žiara v gradiente pozadia */
		--group-bg: rgba(255,255,255,0.06);    /* pozadie skupiny (sieť presvitá) */
		--grid-dot: rgba(255,255,255,.025);    /* mriežka v režime úprav */
		--avatar-bg: #2a3040;                  /* podklad ikony */
		--radius: 14px;
	}
	/* svetlá téma: trieda .light na <html>, prepína sa tlačidlom v hlavičke */
	html.light {
		--bg: #eef1f6;
		--bg2: #ffffff;
		--card: #ffffff;
		--tile: #ffffff;
		--tile-h: #e7ecf4;
		--text: #1d2433;
		--muted: #64708a;
		--line: #d8dee9;
		--bg-glow: #dde5f2;
		--group-bg: rgba(20,40,80,0.05);
		--grid-dot: rgba(0,0,0,.04);
		--avatar-bg: #dfe5ef;
	}
	* { box-sizing: border-box; }
	html, body { margin: 0; height: 100%; }
	body {
		background: radial-gradient(1200px 600px at 70% -10%, var(--bg-glow) 0%, var(--bg) 60%);
		color: var(--text);
		font: 15px/1.4 system-ui, "Segoe UI", Roboto, sans-serif;
		-webkit-font-smoothing: antialiased;
		display: flex; flex-direction: column; overflow: hidden;   /* viewport-sized layout, no page scrollbar */
	}
	/* hlavička bez pozadia: len plávajúce tlačidlá vpravo hore, board ide od vrchu */
	header {
		position: fixed; top: 0; right: 0; z-index: 30;
		display: flex; align-items: center; gap: 14px;
		padding: 16px 22px;
	}
	header .btn { opacity: .3; transition: opacity .15s; }
	header .btn:hover, header .btn.on, header .btn.primary { opacity: 1; }
	/* logo presunuté vpravo dole */
	.brand {
		position: fixed; right: 22px; bottom: 14px; z-index: 30;
		font-weight: 700; font-size: 18px; letter-spacing: .3px;
		pointer-events: none;
	}
	.brand b { color: var(--accent); }
	/* vyhľadávanie: zbalené na 0, po kliknutí na lupu sa rozroluje */
	#search {
		width: 0; padding: 9px 0; border: 0 solid var(--line); opacity: 0;
		background: var(--bg2); color: var(--text); border-radius: 10px;
		font-size: 14px; outline: none;
		transition: width .25s ease, opacity .2s, padding .25s ease;
	}
	body.search-open #search { width: min(260px, 40vw); padding: 9px 14px; border-width: 1px; opacity: 1; }
	#search:focus { border-color: var(--accent); }
	.spacer { flex: 1; }
	.btn {
		background: var(--bg2); color: var(--text); border: 1px solid var(--line);
		padding: 8px 13px; border-radius: 10px; cursor: pointer; font-size: 13px; white-space: nowrap;
	}
	.btn:hover { background: var(--tile-h); }
	.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
	.btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
	.btn.icon { display: inline-flex; align-items: center; justify-content: center; padding: 7px 9px; min-width: 38px; position: relative; }
	.btn.icon svg { width: 17px; height: 17px; display: block; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
	/* prepínač jazyka: malé písmená kódu jazyka, výška zarovnaná s ikonovými tlačidlami */
	#langCode { font-size: 10px; font-weight: 700; letter-spacing: .5px; line-height: 17px; color: var(--muted); }
	#langBtn:hover #langCode { color: var(--text); }
	/* indikátor pripojenia v pravom dolnom rohu tlačidla (ako ping bodka na dlaždici) */
	.dot { position: absolute; right: 4px; bottom: 4px; width: 8px; height: 8px; border-radius: 50%; }
	.dot.ok { background: #46c46a; } .dot.off { background: #c9a13b; }
	/* menu pod ozubeným kolieskom: v hlavičke trvalo len lupa + koliesko,
	   ostatné tlačidlá sa rozrolujú dole ako stĺpec ikon */
	#gearWrap { position: relative; }
	#gearBtn svg { transition: transform .25s; }
	body.gear-open #gearBtn svg { transform: rotate(60deg); }
	#gearMenu {
		position: absolute; top: calc(100% + 8px); right: 0; z-index: 35;
		display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
		opacity: 0; transform: translateY(-6px); pointer-events: none;
		transition: opacity .18s, transform .18s;
	}
	body.gear-open #gearMenu { opacity: 1; transform: none; pointer-events: auto; }
	#gearMenu .btn { opacity: 1; }
	/* neuložené zmeny: koliesko svieti akcentom aj so zavretým menu */
	#gearBtn.dirty { opacity: 1; border-color: var(--accent); color: var(--accent); }
	/* potvrdenie úprav: počas režimu úprav trvalo viditeľné ✓ v hlavičke (netreba otvárať menu) */
	#doneBtn { display: none; }
	body.editing #doneBtn { display: inline-flex; opacity: 1;
		background: var(--accent); border-color: var(--accent); color: #fff; }

	main {
		position: relative;
		flex: 1 1 auto;
		padding: 16px 22px 40px;
		overflow: auto;   /* only the board scrolls, and only when its content is taller than the viewport */
		/* ťahanie myšou po ploche (lasso, presuny) nemá označovať texty dlaždíc a skupín */
		user-select: none; -webkit-user-select: none;
	}
	header, #rail { user-select: none; -webkit-user-select: none; }
	/* v poznámke sa text označovať dá (písanie/kopírovanie), ale nie počas režimu úprav (drag) */
	.note-body { user-select: text; -webkit-user-select: text; }
	body.editing .note-body { user-select: none; -webkit-user-select: none; }
	body.editing main {
		background-image:
			linear-gradient(var(--grid-dot) 1px, transparent 1px),
			linear-gradient(90deg, var(--grid-dot) 1px, transparent 1px);
		background-size: 20px 20px;
	}
	/* animované pozadie: sieť bodov pod celým obsahom, neblokuje ovládanie */
	#bgnet { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
	.group {
		position: absolute; width: 300px;
		/* nízka alfa ≈ odtieň --card, ale sieť za skupinou presvitá */
		background: var(--group-bg);
		border: 1px solid var(--line);
		border-radius: var(--radius); padding: 14px 14px 16px;
	}
	.group.dragging-free { opacity: .85; box-shadow: 0 12px 30px rgba(0,0,0,.45); z-index: 50; }
	.group.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; }
	.group.resizing { outline: 2px dashed var(--accent); outline-offset: 2px; z-index: 50; }
	.resize-handle {
		display: none; position: absolute; right: 2px; bottom: 2px; width: 18px; height: 18px;
		cursor: nwse-resize; touch-action: none; opacity: .55; z-index: 6;
		background: linear-gradient(135deg, transparent 45%, var(--muted) 45%, var(--muted) 55%, transparent 55%, transparent 70%, var(--muted) 70%, var(--muted) 80%, transparent 80%);
		border-radius: 0 0 var(--radius) 0;
	}
	body.editing .resize-handle { display: block; }
	.resize-handle:hover { opacity: 1; }
	.tile.floating, .tile.placed { position: absolute; width: 88px; z-index: 5; }
	.tile.dragging-free { opacity: .85; box-shadow: 0 10px 24px rgba(0,0,0,.45); z-index: 60; }
	main.board-drop { outline: 2px dashed var(--accent); outline-offset: -10px; border-radius: 14px; }
	.drag-handle {
		display: none; cursor: grab; color: var(--muted); font-size: 15px;
		user-select: none; touch-action: none; padding: 0 2px;
	}
	body.editing .drag-handle { display: inline-block; }
	.drag-handle:active { cursor: grabbing; }
	.group-head { display: flex; align-items: center; gap: 8px; margin: 2px 4px 12px; }
	/* otvoriť všetky linky skupiny: ikona v hlavičke, objaví sa až pri hoveri nad skupinou */
	.open-all {
		display: inline-flex; align-items: center; justify-content: center;
		background: none; border: none; color: var(--muted); cursor: pointer;
		padding: 2px 4px; border-radius: 8px;
		opacity: 0; transition: opacity .15s, color .12s;
	}
	.open-all svg { width: 15px; height: 15px; display: block; fill: none; stroke: currentColor;
		stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
	.group:hover .open-all { opacity: 1; }
	.open-all:hover { color: var(--accent); background: var(--group-bg); }
	body.editing .open-all { display: none; }
	.group-title { font-weight: 650; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; flex: 1; }
	.group-title[contenteditable="true"] { color: var(--text); outline: 1px solid var(--accent); border-radius: 6px; padding: 2px 6px; }
	/* free-positioning canvas: links are absolutely placed inside the group, independent of box size */
	.tiles { position: relative; min-height: 40px; }
	.tile {
		position: relative; display: flex; flex-direction: column; align-items: center; gap: 8px;
		background: var(--tile); border: 1px solid var(--line); border-radius: 14px;
		padding: 14px 8px 11px; color: var(--text); text-decoration: none; cursor: pointer;
		text-align: center; transition: transform .06s, background .12s;
	}
	.tile:hover { background: var(--tile-h); transform: translateY(-1px); border-color: transparent; }
	.tile.dragging { opacity: .4; }
	/* hover: rotujúci gradientový okraj vo farbe ikony (--tc nastavuje tileEl,
	   uhol --spin točí malý rAF loop počas hoveru – CSS animácia custom property
	   na pseudo-elemente nie je v Chrome spoľahlivá) */
	.tile::before {
		content: ""; position: absolute; inset: -2px; border-radius: 15px; padding: 2px;
		opacity: 0; pointer-events: none;
		background: conic-gradient(from var(--spin, 0deg),
			var(--tc, var(--accent)), transparent 30%,
			var(--tc, var(--accent)) 50%, transparent 80%, var(--tc, var(--accent)));
		-webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
		-webkit-mask-composite: xor; mask-composite: exclude;
	}
	.tile:hover::before { opacity: 1; }
	/* lasso výber viacerých liniek (režim úprav) */
	.tile.selected { outline: 2px solid var(--accent); outline-offset: 2px; }
	/* aktívny výsledok vyhľadávania (Enter ho otvorí, šípky posúvajú) */
	.tile.hit { outline: 2px solid var(--accent); outline-offset: 2px; background: var(--tile-h); }
	#lasso {
		position: fixed; z-index: 45; display: none; pointer-events: none;
		border: 1px dashed var(--accent); border-radius: 4px;
		background: rgba(91,140,255,.10);
	}
	.icon-wrap { position: relative; }
	.avatar {
		width: 46px; height: 46px; border-radius: 11px; flex: 0 0 46px;
		display: grid; place-items: center; font-weight: 700; font-size: 20px; color: #fff;
		background: var(--avatar-bg); overflow: hidden;
	}
	.avatar-img { width: 100%; height: 100%; object-fit: contain; display: block; }
	.tile-label {
		position: absolute; top: -8px; left: 50%; transform: translateX(-50%); z-index: 2;
		background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; line-height: 1;
		padding: 2px 7px; border-radius: 7px; box-shadow: 0 1px 4px rgba(0,0,0,.45);
		pointer-events: none; max-width: calc(100% - 8px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
	}
	.tile-name { font-size: 10px; font-weight: 500; line-height: 1.2; max-width: 100%;
		overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
	/* ping: bodka stavu dostupnosti v pravom dolnom rohu dlaždice (sivá = nezistené) */
	.ping-dot { position: absolute; right: 5px; bottom: 5px; width: 8px; height: 8px;
		border-radius: 50%; background: var(--muted); pointer-events: none; z-index: 2; }
	.ping-dot.online  { background: #46c46a; box-shadow: 0 0 5px rgba(70,196,106,.8); }
	.ping-dot.offline { background: #e05252; box-shadow: 0 0 5px rgba(224,82,82,.8); }
	/* poznámková dlaždica: pastelový sticky, text sa upravuje priamo na ploche (bez dialógu) */
	.tile.note { display: block; width: 180px; min-height: 104px; padding: 12px 14px;
		text-align: left; cursor: text; color: #3a3325;
		border: 1px solid rgba(0,0,0,.12); box-shadow: 0 4px 12px rgba(0,0,0,.25); }
	.tile.note::before { display: none; }   /* bez rotujúceho hover okraja */
	.tile.note:hover { transform: none; border-color: rgba(0,0,0,.12); }
	.tile.note.floating, .tile.note.placed { width: 180px; }
	.note-body { min-height: 40px; outline: none; font-size: 12.5px; line-height: 1.5;
		white-space: pre-wrap; word-break: break-word; }
	/* úchyt zmeny veľkosti poznámky: viditeľný pri hoveri aj mimo režimu úprav */
	.tile.note:hover .resize-handle { display: block; }
	.tile.note .resize-handle { border-radius: 0 0 14px 0; }
	.note-body::first-line { font-weight: 700; }   /* prvý riadok = nadpis */
	.note-body:empty::before { content: attr(data-ph); color: rgba(0,0,0,.35); }
	body.editing .tile.note { cursor: grab; }
	/* výber pastelovej farby (len v režime úprav) */
	.note-colors { position: absolute; top: -7px; left: 10px; display: flex; gap: 4px; z-index: 3; }
	.note-colors button { width: 14px; height: 14px; border-radius: 50%;
		border: 1px solid rgba(0,0,0,.25); cursor: pointer; padding: 0; }
	.note-colors button.cur { outline: 2px solid var(--accent); outline-offset: 1px; }
	/* widgety (hodiny, šprint): dlaždice bez linku, obsah sa kreslí z dát a času;
	   úpravy (presun, resize, nastavenia) len v režime úprav */
	.tile.widget { display: flex; flex-direction: column; align-items: stretch;
		width: auto; min-width: 150px; padding: 12px 14px; text-align: left; cursor: default; }
	.tile.widget::before { display: none; }
	.tile.widget:hover { transform: none; border-color: var(--line); }
	body.editing .tile.widget { cursor: grab; }
	/* obsah vypĺňa celú výšku widgetu, aby reagoval aj na vertikálne rozťahovanie */
	.wg-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
	.wg-clock .wg-body { justify-content: center; }
	/* hodiny (variant: čas + dátum + ISO týždeň s paritou) */
	.wg-clock .clk-time { font-size: 30px; font-weight: 700; line-height: 1.1;
		font-variant-numeric: tabular-nums; }
	.wg-clock .clk-date { font-size: 12px; color: var(--muted); margin-top: 1px; }
	.wg-clock .clk-wk { display: inline-block; margin-top: 7px; font-size: 10.5px; font-weight: 700;
		background: var(--group-bg); border: 1px solid var(--line); border-radius: 8px; padding: 3px 9px; }
	.wg-clock .clk-wk i { font-style: normal; color: var(--accent); }
	/* šprint (variant: kalendárny pásik 14 dní) */
	.tile.widget.wg-sprint { min-width: 250px; }
	.wg-sprint .sp-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
	.wg-sprint .sp-team { font-size: 12px; font-weight: 700; }
	.wg-sprint .sp-sub { font-size: 10.5px; color: var(--muted); margin-left: auto; white-space: nowrap; }
	.wg-sprint .sp-cal { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px;
		flex: 1; align-content: stretch; }   /* bunky rastú aj s výškou widgetu */
	.wg-sprint .sp-cal i { min-height: 24px; border-radius: 6px; background: var(--bg2);
		border: 1px solid var(--line); display: grid; place-items: center;
		font-size: 9px; font-style: normal; color: var(--muted); }
	.wg-sprint .sp-cal i.wke { opacity: .38; }
	.wg-sprint .sp-cal i.done { color: #fff; border-color: transparent; }
	.wg-sprint .sp-cal i.today { outline: 2px solid currentColor; outline-offset: 1px; font-weight: 700; }
	/* nastavenia widgetu: rad farieb (5 prednastavených + vlastná paleta) */
	.wsw { display: flex; gap: 7px; margin-top: 6px; align-items: center; }
	.wsw button { width: 24px; height: 24px; border-radius: 8px; border: 1px solid var(--line);
		cursor: pointer; padding: 0; }
	.wsw button.on { outline: 2px solid var(--text); outline-offset: 2px; }
	.wsw input[type="color"] { width: 28px; height: 26px; padding: 2px; cursor: pointer; }
	.wsw input[type="color"].on { outline: 2px solid var(--text); outline-offset: 2px; }
	/* switch párny/nepárny v nastaveniach šprintu: klik prehodí posuvník */
	.wswitch { position: relative; display: inline-flex; margin-top: 6px; background: var(--bg2);
		border: 1px solid var(--line); border-radius: 10px; padding: 3px; cursor: pointer;
		user-select: none; }
	.wswitch span { position: relative; z-index: 1; flex: 1; text-align: center;
		padding: 5px 16px; font-size: 12px; color: var(--muted); transition: color .15s;
		white-space: nowrap; }
	.wswitch span.on { color: #fff; font-weight: 600; }
	.wswitch i.thumb { position: absolute; top: 3px; bottom: 3px; left: 3px;
		width: calc(50% - 3px); background: var(--accent); border-radius: 8px;
		transition: transform .18s; }
	/* výber druhu widgetu (dialóg Pridať widget) */
	.wpick { display: flex; align-items: center; gap: 10px; width: 100%; background: none;
		border: none; color: var(--text); cursor: pointer; padding: 9px 10px;
		border-radius: 8px; font-size: 13px; text-align: left; }
	.wpick:hover { background: var(--tile-h); }
	.wpick svg { width: 16px; height: 16px; flex: 0 0 16px; fill: none; stroke: var(--muted);
		stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
	.wpick:hover svg { stroke: var(--accent); }
	.tile .mini { position: absolute; top: -7px; right: -7px; display: none; gap: 3px; }
	body.editing .tile .mini { display: flex; }
	body.editing .tile { cursor: grab; }
	.mini button {
		width: 20px; height: 20px; border-radius: 50%; border: none; cursor: pointer;
		font-size: 11px; line-height: 20px; color: #fff; padding: 0;
	}
	.mini .edit { background: #3a6ad4; } .mini .del { background: #c0413b; }
	.add-tile {
		display: none; align-items: center; justify-content: center;
		border: 1px dashed var(--line); border-radius: 12px; color: var(--muted);
		padding: 10px; cursor: pointer; font-size: 13px;
	}
	body.editing .add-tile { display: flex; }
	.add-tile:hover { border-color: var(--accent); color: var(--text); }
	#addGroup, #addLink, #embedIcons, #accentPick { display: none; }
	body.editing #addGroup, body.editing #addLink, body.editing #embedIcons { display: inline-flex; }
	/* picker akcentovej farby: viditeľný len v režime úprav, tvárou ako ikonové tlačidlo */
	body.editing #accentPick { display: inline-block; }
	#accentPick { width: 38px; height: 31px; padding: 3px 4px; background: var(--bg2);
		border: 1px solid var(--line); border-radius: 10px; cursor: pointer;
		opacity: .3; transition: opacity .15s; }
	#accentPick:hover { opacity: 1; }
	/* zvislý prepínač plôch (tabov) na ľavom okraji: bodky + „+“, názvy pri hoveri */
	#rail { position: fixed; left: 10px; top: 50%; transform: translateY(-50%); z-index: 30;
		display: flex; flex-direction: column; gap: 12px; }
	#rail .rtab { display: flex; align-items: center; gap: 8px; cursor: pointer;
		background: none; border: none; padding: 0; color: var(--muted); font-size: 11px; }
	#rail .rdot { width: 11px; height: 11px; border-radius: 50%; background: var(--line);
		flex: 0 0 11px; transition: transform .12s, background .12s; }
	#rail .rtab:not(.on) .rdot { opacity: .6; }
	#rail .rtab.on .rdot { transform: scale(1.3); opacity: 1; }
	#rail .rlbl { opacity: 0; transform: translateX(-4px); transition: opacity .15s, transform .15s;
		white-space: nowrap; }
	#rail:hover .rlbl { opacity: 1; transform: none; }
	#rail .rtab.on .rlbl { color: var(--text); }
	#rail .rdot.radd { background: none; color: var(--muted); font-size: 15px; font-weight: 700;
		line-height: 11px; text-align: center; opacity: 1; }
	#rail .rtab:hover .rdot.radd { color: var(--accent); }
	/* správa plôch (dialóg) */
	.board-row { display: flex; align-items: center; gap: 8px; padding: 7px 0;
		border-bottom: 1px solid var(--line); }
	.board-row:last-child { border-bottom: 0; }
	.board-row.hid { opacity: .5; }
	.board-row input[type="text"] { width: auto; flex: 1; }
	.board-row input[type="color"] { width: 34px; height: 28px; flex: 0 0 auto; }
	.board-row .btn { padding: 4px 8px; font-size: 12px; flex: 0 0 auto; }
	.board-row .btn svg { width: 14px; height: 14px; display: block; fill: none; stroke: currentColor;
		stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
	.board-row .btn:disabled { opacity: .35; cursor: default; }
	/* oko (skryť/zobraziť) býva vnútri textového poľa, ✕ a + mimo neho */
	.bm-field { position: relative; flex: 1; min-width: 0; }
	.bm-field input[type="text"] { width: 100%; padding-right: 38px; }
	.bm-tools { position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
		display: flex; gap: 2px; }
	.bm-tools .btn { padding: 3px 6px; font-size: 12px; border: none; background: transparent;
		color: var(--muted); border-radius: 7px; }
	.bm-tools .btn:hover { color: var(--text); background: var(--tile-h); }
	.board-row .bm-handle { cursor: grab; color: var(--muted); font-size: 14px;
		user-select: none; touch-action: none; padding: 0; width: 16px; text-align: center;
		flex: 0 0 16px; }
	/* odsadenie pridávacieho riadku = šírka úchytu, aby farby lícovali pod sebou */
	.bm-spacer { flex: 0 0 16px; }
	.board-row .bm-handle:active { cursor: grabbing; }
	.board-row.dragging { opacity: .65; background: var(--tile-h); border-radius: 8px; }
	.board-row.add-row { border-bottom: 0; margin-top: 4px; }
	/* transient toast (fixed, no layout impact) – auto-hides; no permanent status bar */
	.hint {
		position: fixed; left: 22px; bottom: 16px; z-index: 40; max-width: min(70ch, 90vw);
		margin: 0; color: var(--text); font-size: 12px; line-height: 1.4;
		background: var(--bg2); border: 1px solid var(--line); border-radius: 10px;
		padding: 9px 13px; box-shadow: 0 8px 24px rgba(0,0,0,.45);
		opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none;
	}
	.hint.show { opacity: 1; transform: none; }
	.hidden { display: none !important; }

	/* modal */
	.modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
		background: rgba(0,0,0,.55); backdrop-filter: blur(3px); }
	.modal-card { position: relative; width: min(460px, 92vw); max-height: 90vh; overflow: auto;
		background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px 20px 18px;
		box-shadow: 0 20px 60px rgba(0,0,0,.5); }
	.modal-card h3 { margin: 0 0 14px; font-size: 17px; }
	.modal-card label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 5px; }
	.modal-card input, .modal-card textarea {
		width: 100%; background: var(--bg2); border: 1px solid var(--line); color: var(--text);
		padding: 9px 11px; border-radius: 9px; font: inherit; font-size: 13px; outline: none; resize: vertical; }
	.modal-card input:focus, .modal-card textarea:focus { border-color: var(--accent); }
	.modal-card textarea { font-family: ui-monospace, monospace; font-size: 11px; }
	.field-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
	.icon-preview { display: flex; align-items: center; gap: 10px; margin-top: 8px; min-height: 0; }
	.icon-preview img { width: 40px; height: 40px; object-fit: contain; border-radius: 9px; background: var(--avatar-bg); }
	.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
	.check-row { display: flex; align-items: center; gap: 8px; margin: 14px 0 6px; color: var(--text); font-size: 13px; cursor: pointer; }
	.modal-card input[type="checkbox"] { width: auto; }
	.modal-card input[type="color"] { width: 48px; height: 32px; padding: 2px; cursor: pointer; flex: 0 0 auto; }
	.modal-card input[type="color"]:disabled { opacity: .4; cursor: default; }
	.color-row { display: flex; gap: 16px; }
	.color-col { flex: 1; min-width: 0; }
	.color-pick { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
	.color-pick .check-row { margin: 0; font-size: 12px; color: var(--muted); }
	.swatches { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
	.swatch { width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--line); cursor: pointer;
		padding: 0; transition: transform .08s; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
	.swatch:hover { transform: scale(1.12); border-color: var(--accent); }
</style>

	// jazyk: uložená voľba, inak angličtina

		var v = (I18N[lang] || {})[key];
		if(v == null) v = I18N.sk[key];

			var n = vars ? vars.n : null;
			v = (n === 1 && v.one) || (n >= 2 && n <= 4 && v.few) || v.other || v.one || "";

		return String(v).replace(/\{(\w+)\}/g, function(m, k){

		});

	// ---------- helpers ----------
	function clone(o){ return JSON.parse(JSON.stringify(o)); }
	function uid(p){ return (p||"x") + "-" + Math.random().toString(36).slice(2,8); }
	var GRID = 20;
	// tile geometry used for placement / collision (px)
	var TILE_W = 88, TILE_H = 104, TILE_DX = 100, TILE_DY = 120;
	function snap(v){ return Math.round(v / GRID) * GRID; }
	function normalize(s){
		s.groups = s.groups || []; s.links = s.links || []; s.meta = s.meta || {};
		// plochy (taby): migrácia starších dát – všetko existujúce patrí prvej ploche
		s.boards = s.boards || [];
		if(!s.boards.length) s.boards.push({ id: uid("b"), title: t("board_first"), order: 0 });
		s.boards.forEach(function(b,i){ if(b.order==null) b.order=i; });
		var fb = s.boards.slice().sort(function(a,b){return a.order-b.order;})[0].id;
		s.groups.forEach(function(g,i){
			if(!g.boardId) g.boardId = fb;
			if(g.order==null) g.order=i;
			if(g.x==null) g.x = 20 + (i % 4) * 320;     // default spread, user rearranges
			if(g.y==null) g.y = 20 + Math.floor(i / 4) * 360;
			if(g.w==null) g.w = 320;                    // resizable box width
			// g.h is optional: undefined = auto-height to content
			g.x = Math.max(PAD, g.x); g.y = Math.max(PAD, g.y);   // odsadenie od okrajov
		});
		s.links.forEach(function(l,i){
			if(l.order==null) l.order=i;
			if(l.groupId === undefined) l.groupId = null;
			// floating link (no group) needs a board position
			if(l.groupId==null){
				if(!l.boardId) l.boardId = fb;
				if(l.x==null) l.x = 20 + (i % 6) * 160;
				if(l.y==null) l.y = 20;
				l.x = Math.max(PAD, l.x); l.y = Math.max(PAD, l.y);   // odsadenie od okrajov
			}
		});
		// grouped links: give any without coords a default grid position inside their group
		s.groups.forEach(function(g){
			s.links.filter(function(l){return l.groupId===g.id;})
				.sort(function(a,b){return a.order-b.order;})
				.forEach(function(l,i){
					if(l.x==null) l.x = (i % 3) * TILE_DX;
					if(l.y==null) l.y = Math.floor(i / 3) * TILE_DY;
				});
		});
	}
	function groupsSorted(){ return state.groups.slice().sort(function(a,b){return a.order-b.order;}); }
	function linksOf(gid){ return state.links.filter(function(l){return l.groupId===gid;}).sort(function(a,b){return a.order-b.order;}); }
	function hashColor(str){
		var h=0; for(var i=0;i<str.length;i++){ h=str.charCodeAt(i)+((h<<5)-h); }
		return "hsl(" + (Math.abs(h)%360) + ",55%,45%)";
	}
	var hintTimer = null;
	function setHint(t){
		clearTimeout(hintTimer);

		} else {
			hint.classList.remove("show");
		}
	}
	function slugify(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
	function diSvg(n){ return "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/"+n+".svg"; }
	function diPng(n){ return "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/"+n+".png"; }
	// clean a pasted icon value: strip /* */ or // comment wrappers, and whitespace inside data: URIs
	function cleanIcon(v){
		v = String(v || "").trim();
		v = v.replace(/^\/\*+/, "").replace(/\*+\/$/, "").trim();   // /* ... */ block comment
		v = v.replace(/^\/\/+\s*/, "").trim();                      // // line comment
		if (/data:/i.test(v)){                                      // extract data: URI, drop all whitespace
			v = v.slice(v.search(/data:/i)).replace(/\s+/g, "");
		}
		return v;
	}
	// icon candidates: override -> dashboard-icons by name -> app favicon -> (letter fallback handled in tileEl)
	function iconCandidates(l){
		var c = [];
		var icon = cleanIcon(l.icon);
		if (icon){
			var v = icon;
			if (/^(https?:|data:|\/)/i.test(v) || /\.(png|svg|ico|jpg|jpeg|webp|gif)$/i.test(v)) c.push(v); // explicit URL/file
			else { c.push(diSvg(v)); c.push(diPng(v)); }                                                    // dashboard-icons name
		} else {
			var slug = slugify(l.title);
			if (slug) c.push(diSvg(slug));                                                                  // best-effort Homarr look
		}
		try { c.push(new URL(l.url).origin + "/favicon.ico"); } catch(e){}                                  // app favicon
		return c;
	}

	function floatingLinks(){ return state.links.filter(function(l){return l.groupId==null;}).sort(function(a,b){return a.order-b.order;}); }
	function matches(l, q){ return !q || (l.title||"").toLowerCase().indexOf(q)>=0 || (l.url||"").toLowerCase().indexOf(q)>=0 || (l.text||"").toLowerCase().indexOf(q)>=0; }

	var curBoard = null;
	try { curBoard = localStorage.getItem("FAV_board"); } catch(e){}
	function boardsSorted(){ return state.boards.slice().sort(function(a,b){return a.order-b.order;}); }
	function visibleBoards(){ return boardsSorted().filter(function(b){return !b.hidden;}); }
	function storeBoard(){ try { localStorage.setItem("FAV_board", curBoard); } catch(e){} }
	function ensureBoard(){
		if(!visibleBoards().length) boardsSorted()[0].hidden = false;   // aspoň jedna viditeľná
		var ok = state.boards.some(function(b){ return b.id === curBoard && !b.hidden; });
		if(!ok){ curBoard = visibleBoards()[0].id; storeBoard(); }
	}
	function setBoard(id){ curBoard = id; storeBoard(); render(); }
	function boardOfLink(l){

	// ---------- render ----------
	function render(){

	// size each group's canvas so it contains its tiles and fills any extra resized height/width
	function sizeGroupCanvases(){

			if(!g) return;

			var ls = linksOf(g.id);
			var contentBottom = 0, contentRight = 0;
			ls.forEach(function(l){
				contentBottom = Math.max(contentBottom, (l.y||0) + TILE_H);
				contentRight  = Math.max(contentRight,  (l.x||0) + TILE_W);
			});
			var bottomPad = 16, sidePad = 14;
			var headBottom = tiles.offsetTop;   // distance from group top to canvas (incl. head)
			var desiredH = Math.max(contentBottom + 10, g.h ? (g.h - headBottom - bottomPad) : 0);
			tiles.style.height = desiredH + "px";
			// widen group if a tile sticks out past the current width
			var needW = contentRight + sidePad * 2;
			sec.style.width = Math.max(g.w || 320, needW) + "px";
		});
	}

	function enableNoteResize(el, handle, l){
		handle.addEventListener("pointerdown", function(e){
			if(e.button !== 0) return;
			e.preventDefault(); e.stopPropagation();
			var startX = e.clientX, startY = e.clientY;
			var origW = el.offsetWidth, origH = el.offsetHeight;
			el.classList.add("resizing");
			function move(ev){
				el.style.width = Math.max(120, snap(origW + ev.clientX - startX)) + "px";
				el.style.minHeight = Math.max(80, snap(origH + ev.clientY - startY)) + "px";
			}
			function up(){
				document.removeEventListener("pointermove", move);
				document.removeEventListener("pointerup", up);
				el.classList.remove("resizing");
				l.w = parseInt(el.style.width, 10) || origW;
				l.h = parseInt(el.style.minHeight, 10) || origH;
				markDirty();
				// väčšia poznámka mohla prekryť susedov → sprav miesto
				if(l.groupId){ relayoutGroup(l.groupId, l.id); relayoutBoard(l.groupId); }
				else relayoutBoard(l.id);

			}
			document.addEventListener("pointermove", move);
			document.addEventListener("pointerup", up);
		});

	// ---------- widgety: hodiny a šprint (jeden widget = jeden tím) ----------
	var SPRINT_COLORS = ["#5b8cff", "#46c46a", "#e0b050", "#e05252", "#9b6dd6"];
	var CLK_DAYS = {
		sk: ["nedeľa","pondelok","utorok","streda","štvrtok","piatok","sobota"],
		en: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"]
	};
	function pad2(n){ return (n < 10 ? "0" : "") + n; }
	function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
	// ISO týždeň (prvý štvrtok roka) – parita určuje štart šprintu, funguje cez prelom rokov
	function isoWeek(d){
		var x = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
		var day = (x.getUTCDay() + 6) % 7;
		x.setUTCDate(x.getUTCDate() - day + 3);
		var firstThu = new Date(Date.UTC(x.getUTCFullYear(), 0, 4));
		var fday = (firstThu.getUTCDay() + 6) % 7;
		firstThu.setUTCDate(firstThu.getUTCDate() - fday + 3);
		return 1 + Math.round((x - firstThu) / 604800000);
	}
	// šprint = 14 dní od pondelka; parity 0 = štart v párnych ISO týždňoch, 1 = v nepárnych
	function sprintInfo(parity){
		var now = new Date(); now.setHours(0,0,0,0);
		var monday = new Date(now); monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
		var start = new Date(monday);
		if(isoWeek(monday) % 2 !== (parity ? 1 : 0)) start.setDate(start.getDate() - 7);
		var dayIdx = Math.round((now - start) / 86400000);
		return { start: start, day: dayIdx + 1, week: isoWeek(start) };
	}
	function renderWidget(l, el){
		if(!el) return;
		var cfg = l.cfg || {};
		if(l.kind === "clock"){
			var n = new Date();
			var h = n.getHours(), suffix = "";
			if(cfg.h24 === false){ suffix = h >= 12 ? " PM" : " AM"; h = h % 12 || 12; }
			var htm = '<div class="clk-time">' + h + ":" + pad2(n.getMinutes()) +
				(cfg.seconds ? ":" + pad2(n.getSeconds()) : "") + suffix + '</div>';
			if(cfg.date !== false){
				htm += '<div class="clk-date">' + CLK_DAYS[lang === "sk" ? "sk" : "en"][n.getDay()] + " " +
					n.getDate() + ". " + (n.getMonth() + 1) + ". " + n.getFullYear() + '</div>';
			}
			if(cfg.week !== false){
				var w = isoWeek(n);
				htm += '<div class="clk-wk">' + t("wk_label", { n: w }) + ' · <i>' +
					t(w % 2 ? "wk_odd" : "wk_even") + '</i></div>';
			}
			el.innerHTML = htm;
		} else if(l.kind === "sprint"){
			var s = sprintInfo(cfg.parity);
			var color = cfg.color || SPRINT_COLORS[0];
			var cells = "";
			for(var i = 0; i < 14; i++){
				var d = new Date(s.start); d.setDate(s.start.getDate() + i);
				var cls = ((d.getDay() === 0 || d.getDay() === 6) ? "wke " : "") +
					(i < s.day - 1 ? "done " : "") + (i === s.day - 1 ? "today" : "");
				cells += '<i class="' + cls + '" style="' +
					(i < s.day - 1 ? "background:" + escHtml(color) + ";" : "") +
					(i === s.day - 1 ? "color:" + escHtml(color) : "") + '">' + d.getDate() + '</i>';
			}
			el.innerHTML = '<div class="sp-head"><span class="sp-team" style="color:' + escHtml(color) + '">' +
				escHtml(cfg.name || "") + '</span><span class="sp-sub">' + t("sprint_short", { n: s.week }) +
				' · ' + t("sp_day", { d: s.day }) + '</span></div><div class="sp-cal">' + cells + '</div>';
		}
	}

	var tileColors = {};   // id → { src, color }: dominantná farba ikony pre hover okraj
	function tileEl(l){
		if(l.type === "note") return noteEl(l);
		if(l.type === "widget") return widgetEl(l);
		var a = document.createElement("a");
		a.className = "tile";
		a.draggable = false;   // we use pointer-based dragging, not native HTML5 drag
		a.href = l.url; a.target = "_blank"; a.rel = "noopener";
		a.dataset.id = l.id;
		if (l.bg){ a.style.background = l.bg; a.style.borderColor = l.bg; }
		// farba rotujúceho hover okraja: dominantná farba ikony (doplní sa po načítaní),
		// dovtedy vlastné pozadie karty alebo hash farba názvu
		a.style.setProperty("--tc", l.bg || hashColor(l.title));
		if(selected.has(l.id)) a.classList.add("selected");   // lasso výber prežije re-render

		var av = document.createElement("div"); av.className="avatar";
		function letter(){
			av.textContent = (l.title||"?").trim().charAt(0).toUpperCase();
			av.style.background = hashColor(l.title);
		}
		var cands = iconCandidates(l);
		if (cands.length){
			var img = document.createElement("img"); img.className="avatar-img"; img.alt=""; img.loading="lazy"; img.draggable=false;
			var i = 0;
			img.onerror = function(){
				i++;
				if (i < cands.length){ img.src = cands[i]; }
				else { if (img.parentNode) av.removeChild(img); letter(); }
			};
			// po načítaní ikony vytiahni jej dominantnú farbu pre hover okraj
			// (CORS-safe pokus cez druhý Image; pri zlyhaní ostáva fallback farba)
			img.onload = function(){
				var cached = tileColors[l.id];
				if(cached && cached.src === img.src){
					if(cached.color) a.style.setProperty("--tc", cached.color);
					return;
				}
				var im = new Image(); im.crossOrigin = "anonymous";
				im.onload = function(){
					var p = getPalette(im);
					tileColors[l.id] = { src: img.src, color: p[0] || null };
					if(p[0]) a.style.setProperty("--tc", p[0]);
				};
				im.onerror = function(){ tileColors[l.id] = { src: img.src, color: null }; };
				im.src = img.src;
			};
			img.src = cands[0];
			av.appendChild(img);
		} else { letter(); }

		var iconWrap = document.createElement("div"); iconWrap.className = "icon-wrap";
		iconWrap.appendChild(av);
		a.appendChild(iconWrap);

		var nm = document.createElement("div"); nm.className="tile-name"; nm.textContent = l.title;
		if (l.fg) nm.style.color = l.fg;
		a.appendChild(nm);

		// label badge sits on the card edge (Homarr-style), not on the icon
		if (l.label){
			var lb = document.createElement("div"); lb.className = "tile-label"; lb.textContent = l.label;
			a.appendChild(lb);
		}

		// bodka stavu dostupnosti (ping) v pravom dolnom rohu karty
		if (l.ping){
			var pdot = document.createElement("div");
			var pst = pingState[l.id];
			pdot.className = "ping-dot" + (pst ? " " + pst : "");
			pdot.title = pingTitle(pst);
			a.appendChild(pdot);
		}

		var mini = document.createElement("div"); mini.className="mini";
		var ed = document.createElement("button"); ed.className="edit"; ed.textContent="✎"; ed.title=t("edit");
		ed.onclick = function(e){ e.preventDefault(); e.stopPropagation(); editLink(l); };
		var dl = document.createElement("button"); dl.className="del"; dl.textContent="✕"; dl.title=t("del");
		dl.onclick = function(e){ e.preventDefault(); e.stopPropagation(); removeLink(l.id); };
		mini.appendChild(ed); mini.appendChild(dl);
		a.appendChild(mini);

		// block navigation while editing (so drag works, click doesn't open)
		a.addEventListener("click", function(e){ if(editing){ e.preventDefault(); } });
		return a;
	}

	// ---------- free positioning of GROUPS (pointer drag + snap, no overlap) ----------
	function enableFreeDrag(el, handle, obj){
		handle.addEventListener("pointerdown", function(e){
			if(!editing || e.button!==0) return;
			e.preventDefault(); e.stopPropagation();
			var startX = e.clientX, startY = e.clientY;
			var origX = obj.x, origY = obj.y, moved = false;
			el.classList.add("dragging-free");
			function move(ev){
				var dx = ev.clientX - startX, dy = ev.clientY - startY;
				if(Math.abs(dx)>3 || Math.abs(dy)>3) moved = true;
				var nx = Math.max(PAD, Math.min(origX + dx, board.clientWidth - el.offsetWidth - 4));
				var ny = Math.max(PAD, origY + dy);
				el.style.left = snap(nx) + "px";
				el.style.top  = snap(ny) + "px";
			}
			function up(ev){
				document.removeEventListener("pointermove", move);
				document.removeEventListener("pointerup", up);
				el.classList.remove("dragging-free");
				if(!moved) return;
				// keep the group where it was dropped; push any overlapping board elements down to make room
				obj.x = parseInt(el.style.left,10)||0;
				obj.y = parseInt(el.style.top,10)||0;
				relayoutBoard(obj.id);
				markDirty(); render();
			}
			document.addEventListener("pointermove", move);
			document.addEventListener("pointerup", up);
		});
	}

	// ---------- free positioning of TILES (inside a group, between groups, or on the board) ----------
	// rects of a link's siblings inside group gid (for in-group collision), in canvas coords
	function groupSiblingRects(gid, exceptId){
		return state.links.filter(function(l){ return l.groupId===gid && l.id!==exceptId; })
			.map(function(l){ var s = tileSize(l.id); return { x:l.x||0, y:l.y||0, w:s.w, h:s.h }; });
	}
	function enableTileDrag(el, link){
		el.addEventListener("pointerdown", function(e){
			if(!editing || e.button!==0) return;
			if(e.target.closest && e.target.closest(".mini")) return;  // let edit/delete buttons work
			e.preventDefault(); e.stopPropagation();
			// ťah za označenú linku hýbe celým výberom; klik na neoznačenú výber zruší
			if(selected.has(link.id) && selected.size > 1){ startMultiDrag(e); return; }
			if(selected.size && !selected.has(link.id)) clearSelection();
			var startX = e.clientX, startY = e.clientY;
			var origX = link.x||0, origY = link.y||0, moved = false;
			el.classList.add("dragging-free");
			function move(ev){
				var dx = ev.clientX - startX, dy = ev.clientY - startY;
				if(Math.abs(dx)>3 || Math.abs(dy)>3) moved = true;
				el.style.left = snap(origX + dx) + "px";
				el.style.top  = snap(origY + dy) + "px";
			}
			function up(ev){
				document.removeEventListener("pointermove", move);
				document.removeEventListener("pointerup", up);
				el.classList.remove("dragging-free");
				if(!moved) return;
				// remember the source group and its size — it may shrink by this move
				var srcGid = link.groupId;
				var srcSec = srcGid ? board.querySelector('.group[data-gid="'+srcGid+'"]') : null;
				var srcH = srcSec ? srcSec.offsetHeight : 0;
				// the tile must STAY where the drag preview showed it — derive the drop
				// position from the element's rect, not from the cursor (grabbing a tile
				// off-centre would otherwise teleport it by up to half a tile on release)
				var tr = el.getBoundingClientRect();
				var grp = groupUnderPoint(ev.clientX, ev.clientY, el);
				if(grp){
					// dropped inside a group; push overlapping siblings down to make room
					var canvas = board.querySelector('.group[data-gid="'+grp.id+'"] .tiles');
					var rect = canvas.getBoundingClientRect();
					link.groupId = grp.id;
					link.x = snap(Math.max(0, tr.left - rect.left));
					link.y = snap(Math.max(0, tr.top  - rect.top));
					relayoutGroup(grp.id, link.id);
				} else {
					// dropped on empty board → free-floating; push overlapping board elements down
					// (abs. children sit on the board's padding edge, so no padding offset here)
					var br = board.getBoundingClientRect();
					link.groupId = null;
					link.boardId = curBoard;
					link.x = snap(Math.max(PAD, tr.left - br.left + board.scrollLeft));
					link.y = snap(Math.max(PAD, tr.top  - br.top  + board.scrollTop));
					relayoutBoard(link.id);
				}
				markDirty(); render();
				// target group may have grown a row/column → push elements below it away
				if(grp && relayoutBoard(grp.id)){ markDirty(); render(); }
				// source group may have shrunk → pull elements below it back up
				if(srcGid){
					var s2 = board.querySelector('.group[data-gid="'+srcGid+'"]');
					if(s2 && pullUpBelow(srcGid, srcH - s2.offsetHeight)){ markDirty(); render(); }
				}
			}
			document.addEventListener("pointermove", move);
			document.addEventListener("pointerup", up);
		});
	}
	// ---------- multi-drag: presun celého lasso výberu naraz ----------
	function startMultiDrag(e){
		var startX = e.clientX, startY = e.clientY, moved = false;
		var parts = [];
		selected.forEach(function(id){
			var t = board.querySelector('.tile[data-id="'+id+'"]');
			var l = state.links.find(function(x){return x.id===id;});
			if(t && l) parts.push({ el:t, link:l, rect:t.getBoundingClientRect() });
		});
		if(!parts.length) return;
		parts.forEach(function(p){ p.el.classList.add("dragging-free"); });
		function delta(ev){ return { dx: snap(ev.clientX - startX), dy: snap(ev.clientY - startY) }; }
		function move(ev){
			if(Math.abs(ev.clientX-startX)>3 || Math.abs(ev.clientY-startY)>3) moved = true;
			var d = delta(ev);
			parts.forEach(function(p){ p.el.style.transform = "translate("+d.dx+"px,"+d.dy+"px)"; });
		}
		function up(ev){
			document.removeEventListener("pointermove", move);
			document.removeEventListener("pointerup", up);
			parts.forEach(function(p){ p.el.classList.remove("dragging-free"); p.el.style.transform = ""; });
			if(!moved) return;
			var ids = parts.map(function(p){ return p.link.id; });
			// zdrojové skupiny si zapamätaj pred presunom (môžu sa zmenšiť)
			var srcHeights = {};
			parts.forEach(function(p){
				if(p.link.groupId && !(p.link.groupId in srcHeights)){
					var s = board.querySelector('.group[data-gid="'+p.link.groupId+'"]');
					srcHeights[p.link.groupId] = s ? s.offsetHeight : 0;
				}
			});
			var d = delta(ev);
			var grp = groupUnderPoint(ev.clientX, ev.clientY, parts.map(function(p){ return p.el; }));
			if(grp){
				var canvas = board.querySelector('.group[data-gid="'+grp.id+'"] .tiles');
				var cr = canvas.getBoundingClientRect();
				parts.forEach(function(p){
					p.link.groupId = grp.id;
					p.link.x = snap(Math.max(0, p.rect.left + d.dx - cr.left));
					p.link.y = snap(Math.max(0, p.rect.top  + d.dy - cr.top));
				});
				relayoutGroup(grp.id, ids);
			} else {
				var br = board.getBoundingClientRect();
				parts.forEach(function(p){
					p.link.groupId = null;
					p.link.boardId = curBoard;
					p.link.x = snap(Math.max(PAD, p.rect.left + d.dx - br.left + board.scrollLeft));
					p.link.y = snap(Math.max(PAD, p.rect.top  + d.dy - br.top  + board.scrollTop));
				});
				relayoutBoard(ids);
			}
			markDirty(); render();
			// cieľová skupina mohla narásť → odsuň prvky pod ňou
			if(grp && relayoutBoard(grp.id)){ markDirty(); render(); }
			// zdrojové skupiny sa mohli zmenšiť → prisuň prvky pod nimi
			Object.keys(srcHeights).forEach(function(gid){
				if(grp && gid === grp.id) return;
				var s2 = board.querySelector('.group[data-gid="'+gid+'"]');
				if(s2 && pullUpBelow(gid, srcHeights[gid] - s2.offsetHeight)){ markDirty(); render(); }
			});
		}
		document.addEventListener("pointermove", move);
		document.addEventListener("pointerup", up);
	}

	// ---------- lasso: ťahaním po prázdnej ploche označ viac liniek naraz ----------
	function clearSelection(){
		if(!selected.size) return;
		selected.clear();
		[].forEach.call(board.querySelectorAll(".tile.selected"), function(t){ t.classList.remove("selected"); });
	}
	board.addEventListener("pointerdown", function(e){
		if(!editing || e.button!==0) return;
		// lasso štartuje len z prázdnej plochy/pozadia skupiny (dlaždice a úchyty si event stopnú)
		if(e.target.closest && (e.target.closest(".tile") || e.target.closest("button") || e.target.closest(".group-head"))) return;
		e.preventDefault();
		var sx = e.clientX, sy = e.clientY, moved = false;
		var lasso = document.getElementById("lasso");
		function apply(r){
			[].forEach.call(board.querySelectorAll(".tile"), function(t){
				var tr = t.getBoundingClientRect();
				var hit = !(tr.right < r.left || r.right < tr.left || tr.bottom < r.top || r.bottom < tr.top);
				var id = t.dataset.id;
				if(hit) selected.add(id); else selected.delete(id);
				t.classList.toggle("selected", hit);
			});
		}
		function move(ev){
			var r = { left: Math.min(sx, ev.clientX), top: Math.min(sy, ev.clientY),
			          right: Math.max(sx, ev.clientX), bottom: Math.max(sy, ev.clientY) };
			if(r.right-r.left > 4 || r.bottom-r.top > 4) moved = true;
			lasso.style.display = "block";
			lasso.style.left = r.left+"px"; lasso.style.top = r.top+"px";
			lasso.style.width = (r.right-r.left)+"px"; lasso.style.height = (r.bottom-r.top)+"px";
			apply(r);
		}
		function up(){
			document.removeEventListener("pointermove", move);
			document.removeEventListener("pointerup", up);
			lasso.style.display = "none";
			if(!moved) clearSelection();   // obyčajný klik do plochy výber zruší
			else if(selected.size) setHint(t("selected_hint", { n: selected.size }));
		}
		document.addEventListener("pointermove", move);
		document.addEventListener("pointerup", up);
	});

	// ---------- resize groups (width + height, snap) — does NOT affect icon layout ----------
	function enableResize(el, handle, obj){
		handle.addEventListener("pointerdown", function(e){
			if(!editing || e.button!==0) return;
			e.preventDefault(); e.stopPropagation();
			var startX = e.clientX, startY = e.clientY;
			// meraj skutočnú (vykreslenú) veľkosť, nie uloženú: staré uložené g.h/g.w
			// môžu byť menšie než obsah (zápisy spred opravy zmenšovania) a ťah od nich
			// by mal mŕtvu zónu, v ktorej sa box nehýbe ani jedným smerom
			var origW = el.offsetWidth, origH = el.offsetHeight;
			var others = occupiedRects(el);
			// hranice obsahu: pod/za obsah sa skupina zmenšiť nedá; plátno (.tiles) má
			// pevnú výšku z sizeGroupCanvases, takže pri zmenšovaní ho treba ťahať so sebou,
			// inak drží skupinu roztiahnutú a zmenšovanie nevidno (chyba: „vertikálny
			// resize existujúcej skupiny sa nezobrazuje")
			var tiles = el.querySelector(".tiles");
			var headBottom = tiles.offsetTop, bottomPad = 16, sidePad = 14;
			var contentBottom = 0, contentRight = 0;
			linksOf(obj.id).forEach(function(l){
				var s = tileSize(l.id);
				contentBottom = Math.max(contentBottom, (l.y||0) + s.h);
				contentRight  = Math.max(contentRight,  (l.x||0) + s.w);
			});
			var minH = headBottom + Math.max(contentBottom + 10, 40) + bottomPad;
			var minW = Math.max(120, contentRight + sidePad * 2);
			el.classList.add("resizing");
			function move(ev){
				var nw = Math.max(minW, origW + (ev.clientX - startX));
				var nh = Math.max(minH, origH + (ev.clientY - startY));
				// don't let the box grow into a neighbouring element
				var c = clampSize(obj.x, obj.y, nw, nh, others);
				// snap až pred klampom na obsah – zaokrúhlenie nesmie skončiť pod obsahom
				el.style.width = Math.max(minW, snap(c.w)) + "px";
				var h = Math.max(minH, snap(c.h));
				el.style.minHeight = h + "px";
				tiles.style.height = (h - headBottom - bottomPad) + "px";   // živá odozva aj pri zmenšovaní
			}
			function up(){
				document.removeEventListener("pointermove", move);
				document.removeEventListener("pointerup", up);
				el.classList.remove("resizing");
				obj.w = parseInt(el.style.width,10) || origW;
				obj.h = parseInt(el.style.minHeight,10) || origH;
				markDirty(); render();   // re-render so the inner canvas fills the new size
			}
			document.addEventListener("pointermove", move);
			document.addEventListener("pointerup", up);
		});
	}
	function groupUnderPoint(x, y, ignore){
		var ig = Array.isArray(ignore) ? ignore : (ignore ? [ignore] : []);
		var els = document.elementsFromPoint(x, y);
		for(var i=0;i<els.length;i++){
			var skip = false;
			for(var k=0;k<ig.length;k++){
				if(els[i]===ig[k] || ig[k].contains(els[i])){ skip = true; break; }  // skip dragged tiles + children
			}
			if(skip) continue;
			var s = els[i].closest && els[i].closest(".group");
			if(s){ return state.groups.find(function(g){return g.id===s.dataset.gid;}); }
		}
		return null;
	}

	// ---------- collision avoidance for free-positioned elements (groups + floating tiles) ----------
	var GAP = 20;   // odstup pri "sprav miesto" = jeden krok mriežky
	// rectangles of every free-positioned element currently on the board, except `exceptEl`
	function occupiedRects(exceptEl){
		var rects = [];
		[].forEach.call(board.children, function(c){
			if(c===exceptEl) return;
			if(!c.classList.contains("group") && !c.classList.contains("floating")) return;
			rects.push({ x:c.offsetLeft, y:c.offsetTop, w:c.offsetWidth, h:c.offsetHeight });
		});
		return rects;
	}
	function rectsOverlap(a, b, gap){
		gap = gap || 0;
		return !(a.x + a.w + gap <= b.x || b.x + b.w + gap <= a.x ||
		         a.y + a.h + gap <= b.y || b.y + b.h + gap <= a.y);
	}
	function hitsAny(t, rects){
		for(var i=0;i<rects.length;i++){ if(rectsOverlap(t, rects[i], GAP)) return true; }
		return false;
	}
	// nearest snapped position to (x,y) where a w×h box doesn't overlap anything in rects
	function findFreeSpot(x, y, w, h, rects){
		x = Math.max(0, snap(x)); y = Math.max(0, snap(y));
		if(!hitsAny({x:x,y:y,w:w,h:h}, rects)) return { x:x, y:y };
		for(var r=GRID; r<=6000; r+=GRID){
			var cands = [
				{x:x,   y:y+r}, {x:x+r, y:y}, {x:x-r, y:y}, {x:x,   y:y-r},
				{x:x+r, y:y+r}, {x:x-r, y:y+r}, {x:x+r, y:y-r}, {x:x-r, y:y-r}
			];
			for(var i=0;i<cands.length;i++){
				var cx = Math.max(0, cands[i].x), cy = Math.max(0, cands[i].y);
				if(!hitsAny({x:cx, y:cy, w:w, h:h}, rects)) return { x:cx, y:cy };
			}
		}
		return { x:x, y:y };
	}
	// cap a resize so the w×h box at (x,y) doesn't grow into other elements
	function clampSize(x, y, w, h, rects){
		rects.forEach(function(rc){
			var vOverlap = (y < rc.y + rc.h) && (rc.y < y + h);
			if(vOverlap && rc.x >= x) w = Math.min(w, rc.x - GAP - x);
			var hOverlap = (x < rc.x + rc.w) && (rc.x < x + w);
			if(hOverlap && rc.y >= y) h = Math.min(h, rc.y - GAP - y);
		});
		return { w: Math.max(120, w), h: Math.max(80, h) };
	}

	// ---------- "make room": dropped item stays put, overlapping items are pushed DOWN ----------
	// items: [{x,y,w,h}], fixed (index alebo pole indexov) drží miesto; others shift down.
	// Horizontal positions are preserved; y only ever increases → always terminates.
	// Only a REAL overlap (gap 0) triggers a push, so items may sit arbitrarily close;
	// GAP is just the clearance applied once a push is actually needed.
	function packDown(items, fixed){
		var fixedArr = Array.isArray(fixed) ? fixed : [fixed];
		var placed = fixedArr.map(function(i){ return items[i]; });
		var order = [];
		for(var i=0;i<items.length;i++){ if(fixedArr.indexOf(i)<0) order.push(i); }
		order.sort(function(a,b){ return (items[a].y-items[b].y) || (items[a].x-items[b].x); });
		order.forEach(function(i){
			var r = items[i], guard = 0;
			for(;;){
				var pushedTo = null;
				for(var k=0;k<placed.length;k++){
					if(rectsOverlap(r, placed[k], 0)){
						var ny = placed[k].y + placed[k].h + GAP;
						if(ny > (pushedTo==null ? r.y : pushedTo)) pushedTo = ny;
					}
				}
				if(pushedTo==null || guard++>500) break;
				r.y = pushedTo;
			}
			placed.push(r);
		});
	}
	// measured size of a link's tile in the DOM (collision box = what the user actually sees);
	// falls back to the TILE_* constants before the first render
	function tileSize(id){
		var el = board.querySelector('.tile[data-id="'+id+'"]');
		return { w: (el ? el.offsetWidth : TILE_W), h: (el ? el.offsetHeight : TILE_H) };
	}
	// board level (groups + floating tiles share board coords); fixedIds je id alebo pole id
	// práve pustených/zväčšených prvkov; returns true if anything had to move
	function relayoutBoard(fixedIds){
		var ids = Array.isArray(fixedIds) ? fixedIds : [fixedIds];
		var items = [];
		state.groups.forEach(function(g){
			if(g.boardId !== curBoard) return;   // kolízie riešime len na aktívnej ploche
			var sec = board.querySelector('.group[data-gid="'+g.id+'"]');
			items.push({ x:g.x, y:g.y, w:(sec?sec.offsetWidth:(g.w||320)), h:(sec?sec.offsetHeight:(g.h||120)), ref:g });
		});
		floatingLinks().forEach(function(l){ if(l.boardId !== curBoard) return; var s = tileSize(l.id); items.push({ x:l.x, y:l.y, w:s.w, h:s.h, ref:l }); });
		var fixed = [];
		items.forEach(function(it, idx){ if(ids.indexOf(it.ref.id)>=0) fixed.push(idx); });
		if(!fixed.length) return false;
		packDown(items, fixed);
		var changed = false;
		items.forEach(function(it){
			if(it.ref.x!==it.x || it.ref.y!==it.y){ changed = true; it.ref.x = it.x; it.ref.y = it.y; }
		});
		return changed;
	}
	// opposite of the grow-push: when group gid got SMALLER by `delta`, board elements
	// below it (in its x-range) move back up by the same amount, keeping their own
	// spacing; anything that would collide with an unmoved element is nudged down again
	function pullUpBelow(gid, delta){
		if(!(delta > 0)) return false;
		var sec = board.querySelector('.group[data-gid="'+gid+'"]');
		var g = state.groups.find(function(x){return x.id===gid;});
		if(!sec || !g) return false;
		var newBottom = g.y + sec.offsetHeight;
		var items = [];
		state.groups.forEach(function(og){
			if(og.boardId !== curBoard) return;
			var s2 = board.querySelector('.group[data-gid="'+og.id+'"]');
			items.push({ x:og.x, y:og.y, w:(s2?s2.offsetWidth:(og.w||320)), h:(s2?s2.offsetHeight:(og.h||120)), ref:og });
		});
		floatingLinks().forEach(function(l){ if(l.boardId !== curBoard) return; var s = tileSize(l.id); items.push({ x:l.x, y:l.y, w:s.w, h:s.h, ref:l }); });
		var gIt = items.find(function(it){ return it.ref.id===gid; });
		var movers = items.filter(function(it){
			return it!==gIt && it.y >= newBottom && it.x < gIt.x + gIt.w && gIt.x < it.x + it.w;
		});
		if(!movers.length) return false;
		var placed = items.filter(function(it){ return movers.indexOf(it)<0; })
			.map(function(it){ return { x:it.x, y:it.y, w:it.w, h:it.h }; });
		var changed = false;
		movers.sort(function(a,b){ return a.y-b.y; });
		movers.forEach(function(m){
			var r = { x:m.x, y:Math.max(m.y - delta, newBottom + GAP), w:m.w, h:m.h };
			var guard = 0;
			for(;;){
				var hit = null;
				for(var k=0;k<placed.length;k++){ if(rectsOverlap(r, placed[k], 0)){ hit = placed[k]; break; } }
				if(!hit || guard++>500) break;
				r.y = hit.y + hit.h + GAP;
			}
			if(r.y !== m.ref.y) changed = true;
			m.ref.y = r.y;
			placed.push(r);
		});
		return changed;
	}
	// inside one group (tiles share the group-canvas coords); fixedIds je id alebo pole id
	function relayoutGroup(gid, fixedIds){
		var ids = Array.isArray(fixedIds) ? fixedIds : [fixedIds];
		var items = linksOf(gid).map(function(l){ var s = tileSize(l.id); return { x:l.x||0, y:l.y||0, w:s.w, h:s.h, ref:l }; });
		var fixed = [];
		items.forEach(function(it, idx){ if(ids.indexOf(it.ref.id)>=0) fixed.push(idx); });
		if(!fixed.length) return;
		packDown(items, fixed);
		items.forEach(function(it){ it.ref.x = it.x; it.ref.y = it.y; });
	}

	// ---------- modal dialog (add / edit link) ----------
	var modal = document.getElementById("modal");
	var mTitle = document.getElementById("m-title");
	var mUrl = document.getElementById("m-url");
	var mLabel = document.getElementById("m-label");
	var mIcon = document.getElementById("m-icon");
	var mPreview = document.getElementById("m-preview");
	var mBgOn = document.getElementById("m-bg-on");
	var mBg = document.getElementById("m-bg");
	var mFgOn = document.getElementById("m-fg-on");
	var mFg = document.getElementById("m-fg");
	var mPing = document.getElementById("m-ping");
	var mHeading = document.getElementById("modalTitle");
	var modalSave = null;

	function renderIconPreview(){
		mPreview.innerHTML = "";
		var v = cleanIcon(mIcon.value);
		var src = null;
		if (v){
			if (/^(https?:|data:|\/)/i.test(v) || /\.(png|svg|ico|jpg|jpeg|webp|gif)$/i.test(v)) src = v;
			else src = diSvg(v);   // dashboard-icons name
		}
		if (src){
			var img = document.createElement("img"); img.alt=t("preview_alt");
			img.onerror = function(){ mPreview.innerHTML = '<span class="field-hint">' + t("preview_fail") + '</span>'; };
			img.src = src;
			mPreview.appendChild(img);
			var cap = document.createElement("span"); cap.className="field-hint"; cap.textContent=t("preview_cap");
			mPreview.appendChild(cap);
		}
		loadPalette(src);   // refresh the colour swatches from this icon
	}

	// ---------- colour swatches (white, black + dominant colours from the icon) ----------
	function rgbHex(r,g,b){ return "#"+[r,g,b].map(function(v){ return ("0"+(v&255).toString(16)).slice(-2); }).join(""); }
	// extract up to 5 dominant colours from an image via a small canvas (needs CORS-clean source)
	function getPalette(img){
		try {
			var n = 24, cv = document.createElement("canvas"); cv.width = n; cv.height = n;
			var ctx = cv.getContext("2d"); ctx.drawImage(img, 0, 0, n, n);
			var d = ctx.getImageData(0, 0, n, n).data, counts = {};
			for(var i=0;i<d.length;i+=4){
				if(d[i+3] < 125) continue;                         // skip transparent
				var r=(d[i]&0xE0), g=(d[i+1]&0xE0), b=(d[i+2]&0xE0); // quantise to 3 bits/channel
				var key = r+","+g+","+b; counts[key] = (counts[key]||0) + 1;
			}
			return Object.keys(counts)
				.map(function(k){ var p=k.split(",").map(Number); return { hex:rgbHex(p[0]+16,p[1]+16,p[2]+16), n:counts[k] }; })
				.sort(function(a,b){ return b.n - a.n; })
				.slice(0, 5).map(function(c){ return c.hex; });
		} catch(e){ return []; }   // tainted canvas (e.g. favicon without CORS headers)
	}
	function makeSwatch(color, input, checkbox){
		var b = document.createElement("button");
		b.type = "button"; b.className = "swatch"; b.style.background = color; b.title = color;
		b.onclick = function(){ input.value = color; checkbox.checked = true; input.disabled = false; };
		return b;
	}
	function renderSwatches(palette){
		var base = ["#ffffff", "#000000"].concat(palette || []);
		[[ "m-bg-sw", mBg, mBgOn ], [ "m-fg-sw", mFg, mFgOn ]].forEach(function(cfg){
			var box = document.getElementById(cfg[0]); box.innerHTML = "";
			base.forEach(function(c){ box.appendChild(makeSwatch(c, cfg[1], cfg[2])); });
		});
	}
	function loadPalette(src){
		renderSwatches([]);                       // show white/black immediately
		if(!src) return;
		var im = new Image(); im.crossOrigin = "anonymous";
		im.onload  = function(){ renderSwatches(getPalette(im)); };
		im.onerror = function(){ renderSwatches([]); };
		im.src = src;
	}

	function openLinkModal(heading, data, onSave){
		mHeading.textContent = heading;

					var r = others[i].getBoundingClientRect();

				}
				box.insertBefore(row, next);   // null → na koniec

				document.removeEventListener("pointermove", move);
				document.removeEventListener("pointerup", up);
				row.classList.remove("dragging");
				// poradie v DOM → order v dátach
				[].forEach.call(box.querySelectorAll(".board-row"), function(rw, k){
