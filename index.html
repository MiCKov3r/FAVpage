	// ---------- embed external icons as base64 into links.js (offline) ----------
	function blobToDataURL(blob){
		return new Promise(function(res, rej){
			var fr = new FileReader();
			fr.onload = function(){ res(fr.result); };
			fr.onerror = function(){ rej(fr.error); };
			fr.readAsDataURL(blob);
		});
	}
	// real image type of a blob, or null: trust an image/* MIME, otherwise sniff the
	// first bytes — many homelab servers send icons as octet-stream/text/plain, and
	// SPA/login servers return their HTML page with 200 for /favicon.ico (never trust
	// the URL extension: that is how a whole login page once got embedded as an icon)
	async function imageBlobType(blob){
		if(/^image\//i.test(blob.type)) return blob.type;
		try {
			var b = new Uint8Array(await blob.slice(0, 16).arrayBuffer());
			if(b[0]===0x89 && b[1]===0x50 && b[2]===0x4E && b[3]===0x47) return "image/png";
			if(b[0]===0x00 && b[1]===0x00 && b[2]===0x01 && b[3]===0x00) return "image/x-icon";
			if(b[0]===0x47 && b[1]===0x49 && b[2]===0x46 && b[3]===0x38) return "image/gif";
			if(b[0]===0xFF && b[1]===0xD8) return "image/jpeg";
			if(b[0]===0x42 && b[1]===0x4D) return "image/bmp";
			if(b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[3]===0x46 &&
			   b[8]===0x57 && b[9]===0x45 && b[10]===0x42 && b[11]===0x50) return "image/webp";
			var head = (await blob.slice(0, 256).text()).trim().toLowerCase();
			if(head.indexOf("<svg")===0 || (head.indexOf("<?xml")===0 && head.indexOf("<svg")>=0)) return "image/svg+xml";
		} catch(e){}
		return null;
	}
	async function embedIcons(){
		var changed = 0, failed = 0, notImage = 0, total = state.links.length;
		setHint(t("embed_progress", { i: 0, n: total }));
		for(var i=0;i<state.links.length;i++){
			var l = state.links[i];
			if(l.type === "note" || l.type === "widget") continue;   // poznámky a widgety ikony nemajú
			// only a data:image counts as embedded — a broken non-image data: gets re-fetched
			if(/^data:image\//i.test(cleanIcon(l.icon))) continue;
			var cands = iconCandidates(l), uri = null, sawNonImage = false;
			for(var c=0;c<cands.length;c++){
				var url = cands[c];
				try {
					var res = await fetch(url, { mode:"cors" });
					if(!res.ok) continue;
					var blob = await res.blob();
					var type = await imageBlobType(blob);
					if(!type){ sawNonImage = true; continue; }             // not an image → next candidate
					if(blob.type !== type) blob = new Blob([blob], { type: type });  // fix wrong MIME for the data: URI
					uri = await blobToDataURL(blob);
					break;
				} catch(e){ /* CORS/network → try next candidate */ }
			}
			if(uri){ l.icon = uri; changed++; }
			else if(sawNonImage){ notImage++; }
			else { failed++; }
			setHint(t("embed_progress", { i: i+1, n: total }));
		}
		if(changed){ markDirty(); render(); }
		setHint(t("embed_done", { n: changed })
			+ (failed ? t("embed_failed", { n: failed }) : "")
			+ (notImage ? t("embed_notimg", { n: notImage }) : ""));
	}

	// ---------- ping: kontrola dostupnosti liniek (HTTP, nie ICMP – to z prehliadača nejde) ----------
	// no-cors fetch: vyriešený promise = server odpovedal → online (odpoveď je "opaque",
	// status nevidíme, takže zelená znamená "server žije", nie "stránka je bez chyby");
	// zamietnutý = offline (DNS/spojenie); timeout = nezistené (sivá)
	var PING_TIMEOUT = 6000, PING_INTERVAL = 5 * 60000, PING_PARALLEL = 4;
	var pingState = {};   // id → "online" | "offline" | "unknown"
	function pingTitle(st){
		return st==="online"  ? t("ping_online")
		     : st==="offline" ? t("ping_offline")
		     : st==="unknown" ? t("ping_unknown")
		     : t("ping_checking");
	}
	function pingOnce(url){
		return new Promise(function(res){
			var ctrl = new AbortController();
			var t = setTimeout(function(){ ctrl.abort(); }, PING_TIMEOUT);
			fetch(url, { mode:"no-cors", cache:"no-store", signal: ctrl.signal })
				.then(function(){ res("online"); })
				.catch(function(e){ res(e && e.name==="AbortError" ? "unknown" : "offline"); })
				.finally(function(){ clearTimeout(t); });
		});
	}
	// offline až po 2 zlyhaniach za sebou – adblock/proxy vie zabiť request aj pri živom serveri
	async function pingLink(l){
		var st = await pingOnce(l.url);
		if(st === "offline") st = await pingOnce(l.url);
		pingState[l.id] = st;
		var el = board.querySelector('.tile[data-id="'+l.id+'"] .ping-dot');
		if(el){ el.className = "ping-dot " + st; el.title = pingTitle(st); }
	}
	async function pingAll(){
		var q = state.links.filter(function(l){ return l.ping && l.url; });
		if(!q.length) return;
		var i = 0;
		async function worker(){ while(i < q.length) await pingLink(q[i++]); }
		var ws = []; for(var w = 0; w < PING_PARALLEL; w++) ws.push(worker());
		await Promise.all(ws);
	}

	// ---------- File System Access ----------
	function serialize(){
		return "// FAVpage data — loaded via <script src=\"links.js\"><\/script>\n" +
		       "// Auto-generated, neupravuj ručne ak používaš appku.\n" +
		       "window.FAV = " + JSON.stringify(state, null, 2) + ";\n";
	}
	async function connect(){
		if(!window.showOpenFilePicker){ alert(t("no_fsapi")); return; }
		try {
			var [h] = await window.showOpenFilePicker({
				types:[{description:"links.js", accept:{"text/javascript":[".js"]}}],
				multiple:false
			});
			var perm = await h.requestPermission({ mode:"readwrite" });
			if(perm!=="granted"){ alert(t("no_write")); return; }
			fileHandle = h;
			await idbSet("linksHandle", h);
			await reloadFromFile();   // pull latest synced version
			updateStatus(t("connected_msg"));
		} catch(e){ if(e.name!=="AbortError") setHint(t("err_connect", { msg: e.message })); }
	}
	// safety net on every save: drop any embedded icon that is not a real image
	// (e.g. an HTML page embedded from /favicon.ico) so bad data never reaches links.js;
	// the link falls back to the automatic icon chain (favicon → letter)
	function sanitizeIcons(){
		var n = 0;
		state.links.forEach(function(l){
			var v = cleanIcon(l.icon);
			if(/^data:/i.test(v) && !/^data:image\//i.test(v)){ l.icon = ""; n++; }
		});
		return n;
	}
	async function saveToFile(){
		var cleaned = sanitizeIcons();
		if(cleaned) render();
		try {
			if(!fileHandle){
				// first save: let the user pick links.js, then WRITE current state (no reload/overwrite)
				if(!window.showOpenFilePicker){ alert(t("no_fsapi")); return; }
				var [h] = await window.showOpenFilePicker({
					types:[{description:"links.js", accept:{"text/javascript":[".js"]}}],
					multiple:false
				});
				if((await h.requestPermission({ mode:"readwrite" }))!=="granted"){ alert(t("no_write")); return; }
				fileHandle = h; await idbSet("linksHandle", h);
			} else {
				if((await fileHandle.queryPermission({mode:"readwrite"}))!=="granted"){
					if((await fileHandle.requestPermission({mode:"readwrite"}))!=="granted") return;
				}
			}
			var w = await fileHandle.createWritable();
			await w.write(serialize()); await w.close();
			dirty = false;
			updateStatus(t("saved_at", { time: new Date().toLocaleTimeString() })
				+ (cleaned ? t("saved_cleaned", { n: cleaned }) : ""));
		} catch(e){ if(e.name!=="AbortError") setHint(t("err_save", { msg: e.message })); }
	}
	async function reloadFromFile(){
		if(!fileHandle){ setHint(t("connect_first")); return; }
		if(dirty && !confirm(t("reload_confirm"))) return;
		try {
			var f = await fileHandle.getFile();
			var text = await f.text();
			var w = {}; (new Function("window", text))(w);
			if(w.FAV){ state = clone(w.FAV); normalize(state); dirty = false; applyAccent(); render();
				// user chose the file as the source of truth → align the cache with it
				try { localStorage.setItem("FAV_cache", JSON.stringify(state)); } catch(e){}
				updateStatus(t("loaded_at", { time: new Date().toLocaleTimeString() })); }
		} catch(e){ setHint(t("err_load", { msg: e.message })); }
	}
	async function tryRestoreHandle(){
		try {
			var h = await idbGet("linksHandle");
			if(h){ fileHandle = h; updateStatus(t("handle_remembered")); }
		} catch(e){}
	}

	// multi-computer sync: another machine may have written links.js (via Nextcloud)
	// while this page is open — compare the file's content timestamp in the background
	// (on focus + every minute) and auto-load it when it is newer; never overwrites
	// local unsaved changes, only warns about the conflict
	async function checkFileForUpdates(){
		if(!fileHandle) return;
		try {
			if((await fileHandle.queryPermission({ mode:"read" })) !== "granted") return;  // stay silent, no permission prompt
			var f = await fileHandle.getFile();
			var text = await f.text();
			var w = {}; (new Function("window", text))(w);
			if(!w.FAV || stateTs(w.FAV) <= stateTs(state)) return;
			if(dirty){
				setHint(t("file_conflict"));
				return;
			}
			state = clone(w.FAV); normalize(state); applyAccent(); render();
			try { localStorage.setItem("FAV_cache", JSON.stringify(state)); } catch(e){}
			updateStatus(t("newer_loaded", { time: new Date(stateTs(state)).toLocaleTimeString() }));
		} catch(e){ /* background check must never bother the user */ }
	}

	// tiny IndexedDB kv
	function idb(){ return new Promise(function(res,rej){
		var r = indexedDB.open("favpage",1);
		r.onupgradeneeded=function(){ r.result.createObjectStore("kv"); };
		r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); };
	}); }
	async function idbSet(k,v){ var db=await idb(); return new Promise(function(res,rej){
		var t=db.transaction("kv","readwrite"); t.objectStore("kv").put(v,k);
		t.oncomplete=function(){res();}; t.onerror=function(){rej(t.error);}; }); }
	async function idbGet(k){ var db=await idb(); return new Promise(function(res,rej){
		var t=db.transaction("kv","readonly"); var rq=t.objectStore("kv").get(k);
		rq.onsuccess=function(){res(rq.result);}; rq.onerror=function(){rej(rq.error);}; }); }

	// ---------- status / ui ----------
	function updateStatus(msg){
		var dot = document.getElementById("connDot");
		var btn = document.getElementById("connectBtn");
		if(fileHandle){ dot.className="dot ok"; btn.title=t("connected_title"); }
		else { dot.className="dot off"; btn.title=t("connect_title"); }
		document.getElementById("saveBtn").classList.toggle("primary", dirty);
		// stav aj na kolieska (menu býva zavreté): bodka pripojenia + akcent pri neuloženom
		document.getElementById("gearDot").className = fileHandle ? "dot ok" : "dot off";
		document.getElementById("gearBtn").classList.toggle("dirty", dirty);
		if(msg) setHint(msg);
	}

	function toggleEdit(){
		editing = !editing;
		if(!editing) clearSelection();
		document.body.classList.toggle("editing", editing);
		var eb = document.getElementById("editBtn");
		eb.classList.toggle("on", editing);
		eb.innerHTML = editing
			? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'        // ✓ check
			: '<svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>'; // pencil
		eb.title = editing ? t("done") : t("edit");
		render();
		setHint(editing ? t("edit_hint") : "");
	}

	// ---------- dlhé podržanie na dlaždici/skupine zapne režim úprav ----------
	// 3 s držania bez pohybu (tolerancia 10 px); len zapína – vypínanie ostáva na ✓,
	// aby dlhšie podržanie počas ťahania ikony omylom nevyplo úpravy.
	// Po aktivácii render() vymení DOM, takže klik po pustení sa už nevystrelí.
	var HOLD_MS = 3000, HOLD_TOL = 10;
	(function(){
		var timer = null, sx = 0, sy = 0;
		function cancelHold(){ if(timer){ clearTimeout(timer); timer = null; } }
		board.addEventListener("pointerdown", function(e){
			if(editing || e.button !== 0) return;
			if(e.target.closest && e.target.closest(".note")) return;   // v poznámke sa píše/označuje text
			if(!(e.target.closest && (e.target.closest(".tile") || e.target.closest(".group")))) return;
			sx = e.clientX; sy = e.clientY;
			cancelHold();
			timer = setTimeout(function(){ timer = null; toggleEdit(); }, HOLD_MS);
		});
		board.addEventListener("pointermove", function(e){
			if(timer && (Math.abs(e.clientX - sx) > HOLD_TOL || Math.abs(e.clientY - sy) > HOLD_TOL)) cancelHold();
		});
		board.addEventListener("pointerup", cancelHold);
		board.addEventListener("pointercancel", cancelHold);
	})();

	// ---------- otvorenie všetkých liniek skupiny do nových tabov ----------
	// rešpektuje aktívny filter vyhľadávania; Chrome z jedného kliku pustí len prvý
	// window.open, kým používateľ nepovolí vyskakovacie okná – zablokované taby
	// zistíme z návratovej hodnoty null a poradíme, čo s tým
	function openGroupLinks(gid){
		var q = searchEl.value.trim().toLowerCase();
		var ls = linksOf(gid).filter(function(l){ return matches(l, q) && l.url; });
		if(!ls.length) return;
		if(ls.length > 8 && !confirm(t("open_all_q", { n: ls.length }))) return;
		var blocked = 0;
		ls.forEach(function(l){ if(!window.open(l.url, "_blank", "noopener")) blocked++; });
		if(blocked) setHint(t("popup_blocked", { n: blocked }));
	}

	// ---------- pridanie linku ťahom z prehliadača (URL z adresného riadka / záložka / odkaz zo stránky) ----------
	// natívny HTML5 drag&drop – nekoliduje s interným pointer-based ťahaním dlaždíc (tie majú draggable=false)
	function dragUrl(dt){
		var raw = dt.getData("text/uri-list") || dt.getData("text/plain") || "";
		var line = "";
		raw.split(/\r?\n/).some(function(s){ s = s.trim(); if(s && s.charAt(0) !== "#"){ line = s; return true; } return false; });
		return /^https?:\/\//i.test(line) ? line : null;
	}
	function dragTitle(dt, url){
		// ťah odkazu zo stránky / záložky nesie text v text/html; adresný riadok ho nemá
		try {
			var html = dt.getData("text/html");
			if(html){
				var a = new DOMParser().parseFromString(html, "text/html").querySelector("a");
				var txt = (a ? a.textContent : "").trim().replace(/\s+/g, " ");
				if(txt && txt.length <= 60 && !/^https?:\/\//i.test(txt)) return txt;
			}
		} catch(e){}
		try {
			var h = new URL(url).hostname.replace(/^www\./, "");
			return h ? h.charAt(0).toUpperCase() + h.slice(1) : url;
		} catch(e){ return url; }
	}
	// počas dragover sa dáta čítať nedajú, len typy – Files (ťah súboru) ignorujeme
	function hasUrlDrag(dt){
		if(!dt) return false;
		return [].indexOf.call(dt.types || [], "text/uri-list") >= 0
		    || [].indexOf.call(dt.types || [], "text/plain") >= 0;
	}
	function clearDropHover(){
		board.classList.remove("board-drop");
		[].forEach.call(board.querySelectorAll(".group.drag-over"), function(s){ s.classList.remove("drag-over"); });
	}
	board.addEventListener("dragover", function(e){
		if(!hasUrlDrag(e.dataTransfer)) return;
		e.preventDefault();
		e.dataTransfer.dropEffect = "copy";
		board.classList.add("board-drop");
		var sec = e.target.closest && e.target.closest(".group");
		[].forEach.call(board.querySelectorAll(".group.drag-over"), function(s){ if(s !== sec) s.classList.remove("drag-over"); });
		if(sec) sec.classList.add("drag-over");
	});
	board.addEventListener("dragleave", function(e){
		if(!e.relatedTarget || !board.contains(e.relatedTarget)) clearDropHover();
	});
	board.addEventListener("drop", function(e){
		if(!hasUrlDrag(e.dataTransfer)) return;
		e.preventDefault();
		clearDropHover();
		var url = dragUrl(e.dataTransfer);
		if(!url) return;
		var nl = { id: uid("l"), title: dragTitle(e.dataTransfer, url), url: url,
			icon: "", label: "", bg: "", fg: "", order: state.links.length };
		var sec = e.target.closest && e.target.closest(".group");
		var g = sec ? state.groups.find(function(x){ return x.id === sec.dataset.gid; }) : null;
		if(g){
			// pustené do skupiny → dlaždica na mieste kurzora (stred pod kurzorom), prekryvy sa odsunú
			var cr = sec.querySelector(".tiles").getBoundingClientRect();
			nl.groupId = g.id;
			nl.x = snap(Math.max(0, e.clientX - cr.left - TILE_W / 2));
			nl.y = snap(Math.max(0, e.clientY - cr.top  - TILE_H / 2));
			state.links.push(nl);
			relayoutGroup(g.id, nl.id);
		} else {
			// pustené na voľnú plochu → samostatná dlaždica
			var br = board.getBoundingClientRect();
			nl.groupId = null;
			nl.boardId = curBoard;
			nl.x = snap(Math.max(PAD, e.clientX - br.left + board.scrollLeft - TILE_W / 2));
			nl.y = snap(Math.max(PAD, e.clientY - br.top  + board.scrollTop  - TILE_H / 2));
			state.links.push(nl);
			relayoutBoard(nl.id);
		}
		markDirty(); render();
		// skupina mohla narásť o riadok → odsuň prvky pod ňou
		if(g && relayoutBoard(g.id)){ markDirty(); render(); }
		setHint(t("drop_added", { title: nl.title }));
	});

	// ---------- wire up ----------
	document.getElementById("editBtn").onclick = toggleEdit;
	document.getElementById("doneBtn").onclick = toggleEdit;
	document.getElementById("addGroup").onclick = addGroup;
	document.getElementById("addLink").onclick = addFloatingLink;
	document.getElementById("addNote").onclick = addNote;
	// jedna položka „Pridať widget“ – druh sa vyberá zo zoznamu v dialógu
	var widgetPickModal = document.getElementById("widgetPickModal");
	document.getElementById("addWidget").onclick = function(){ widgetPickModal.classList.remove("hidden"); };
	[].forEach.call(document.querySelectorAll("#widgetPickList .wpick"), function(b){
		b.onclick = function(){ widgetPickModal.classList.add("hidden"); addWidget(b.dataset.kind); };
	});
	widgetPickModal.addEventListener("mousedown", function(e){ if(e.target === widgetPickModal) widgetPickModal.classList.add("hidden"); });
	widgetPickModal.addEventListener("keydown", function(e){
		if(e.key === "Escape"){ e.preventDefault(); e.stopPropagation(); widgetPickModal.classList.add("hidden"); }
	});
	document.getElementById("embedIcons").onclick = embedIcons;
	document.getElementById("connectBtn").onclick = connect;
	document.getElementById("saveBtn").onclick = saveToFile;
	document.getElementById("langBtn").onclick = function(){ setLang(lang === "sk" ? "en" : "sk"); };
	// menu pod ozubeným kolieskom: toggle kolieskom, zatvorenie klikom mimo, Escapom
	// alebo výberom položky (okrem color inputu – ten potrebuje ostať zobrazený)
	document.getElementById("gearBtn").onclick = function(){
		document.body.classList.toggle("gear-open");
	};
	document.addEventListener("click", function(e){
		if(!document.body.classList.contains("gear-open")) return;
		if(e.target.closest && e.target.closest("#gearWrap") &&
		   !(e.target.closest("#gearMenu") && e.target.closest("button"))) return;
		if(e.target.closest && e.target.closest("#gearBtn")) return;
		document.body.classList.remove("gear-open");
	});
	document.getElementById("themeBtn").onclick = function(){
		theme = (theme === "light") ? "dark" : "light";
		try { localStorage.setItem("FAV_theme", theme); } catch(e){}
		applyTheme();
	};
	// input = živý náhľad počas výberu, change = potvrdenie → uloženie do dát
	accentPick.addEventListener("input", function(){
		state.meta.accent = accentPick.value;
		applyAccent();
	});
	accentPick.addEventListener("change", function(){ markDirty(); });

	// rotácia hover okraja dlaždice: rAF loop točí --spin len na dlaždici pod kurzorom
	(function(){
		var el = null, raf = 0, ang = 0, last = 0;
		function tick(t){
			if(!el){ raf = 0; return; }
			ang = (ang + (t - last) * 0.225) % 360;   // 360° za 1.6 s
			last = t;
			el.style.setProperty("--spin", ang + "deg");
			raf = requestAnimationFrame(tick);
		}
		board.addEventListener("mouseover", function(e){
			var t = e.target.closest && e.target.closest(".tile");
			if(!t || t === el) return;
			if(el) el.style.removeProperty("--spin");
			el = t; ang = 0;
			if(!raf){ last = performance.now(); raf = requestAnimationFrame(tick); }
		});
		board.addEventListener("mouseout", function(e){
			var t = e.target.closest && e.target.closest(".tile");
			if(t && el === t && !(e.relatedTarget && t.contains(e.relatedTarget))){
				t.style.removeProperty("--spin");
				el = null;
			}
		});
	})();

	var searchBtn = document.getElementById("searchBtn");
	function openSearch(){
		document.body.classList.add("search-open");
		searchBtn.classList.add("on");
		setTimeout(function(){ searchEl.focus(); }, 0);
	}
	function closeSearch(){
		if(searchEl.value){ searchEl.value = ""; render(); }
		document.body.classList.remove("search-open");
		searchBtn.classList.remove("on");
	}
	searchBtn.addEventListener("mousedown", function(e){ e.preventDefault(); });  // nechaj fokus v inpute, inak blur predbehne klik
	searchBtn.onclick = function(){
		if(document.body.classList.contains("search-open")) closeSearch();
		else openSearch();
	};
	// prázdny input po odchode fokusu sa sám zbalí
	searchEl.addEventListener("blur", function(){ if(!searchEl.value.trim()) closeSearch(); });
	searchEl.addEventListener("input", function(){ hitIdx = 0; render(); });
	// klávesnica vo vyhľadávaní: ↓/↑ prepínajú výsledky, Enter otvorí označený;
	// keď nič nenájde, Enter pošle výraz do webového vyhľadávača (meta.searchUrl, default Google)
	var hitIdx = 0;
	function searchHits(){
		return searchEl.value.trim() ? [].slice.call(board.querySelectorAll(".tile")) : [];
	}
	function updateSearchHit(){
		[].forEach.call(board.querySelectorAll(".tile.hit"), function(t){ t.classList.remove("hit"); });
		var hits = searchHits();
		if(!hits.length) return;
		hitIdx = ((hitIdx % hits.length) + hits.length) % hits.length;
		hits[hitIdx].classList.add("hit");
		hits[hitIdx].scrollIntoView({ block: "nearest" });
	}
	searchEl.addEventListener("keydown", function(e){
		if(e.key === "ArrowDown" || e.key === "ArrowUp"){
			e.preventDefault();
			hitIdx += (e.key === "ArrowDown" ? 1 : -1);
			updateSearchHit();
		} else if(e.key === "Enter"){
			var q = searchEl.value.trim();
			if(!q) return;
			e.preventDefault();
			var hits = searchHits();
			if(hits.length){
				// poznámka nemá href – Enter ju neotvára
				var href = hits[((hitIdx % hits.length) + hits.length) % hits.length].href;
				if(!href) return;
				window.open(href, "_blank", "noopener");
			} else {
				// nič na aktívnej ploche – najprv skús ostatné plochy, až potom webové vyhľadávanie
				var lq = q.toLowerCase(), other = null;
				visibleBoards().forEach(function(b){
					if(other || b.id === curBoard) return;
					var has = state.links.some(function(l){ return matches(l, lq) && boardOfLink(l) === b.id; });
					if(has) other = b;
				});
				if(other){ setBoard(other.id); setHint(t("search_switched", { title: other.title })); return; }
				var eng = (state.meta && state.meta.searchUrl) || "https://www.google.com/search?q=";
				window.open(eng + encodeURIComponent(q), "_blank", "noopener");
			}
			closeSearch(); searchEl.blur();
		}
	});
	document.addEventListener("keydown", function(e){
		if(e.key==="/" && document.activeElement!==searchEl){ e.preventDefault(); openSearch(); }
		if(e.key==="Escape"){ closeSearch(); searchEl.blur(); clearSelection(); document.body.classList.remove("gear-open");
			document.getElementById("widgetPickModal").classList.add("hidden"); }
		// Alt+1…9 prepína plochy (Ctrl+čísla používa prehliadač na svoje taby)
		if(e.altKey && !e.ctrlKey && !e.metaKey && e.key >= "1" && e.key <= "9"){
			var vb = visibleBoards(), ix = e.key.charCodeAt(0) - 49;
			if(vb[ix]){ e.preventDefault(); setBoard(vb[ix].id); }
		}
		// Ctrl+šípka hore/dole cykluje medzi plochami v poradí railu
		if(e.ctrlKey && !e.altKey && !e.metaKey && (e.key === "ArrowUp" || e.key === "ArrowDown")){
			var vb2 = visibleBoards();
			if(vb2.length > 1){
				var ci = 0;
				vb2.forEach(function(b, i){ if(b.id === curBoard) ci = i; });
				var ni = (ci + (e.key === "ArrowDown" ? 1 : -1) + vb2.length) % vb2.length;
				e.preventDefault();
				setBoard(vb2[ni].id);
			}
		}
	});

	applyI18n();
	render();
	tryRestoreHandle().then(checkFileForUpdates);
	updateStatus();
	if(dirty) setHint(t("restored_hint"));
	window.addEventListener("focus", checkFileForUpdates);
	setInterval(checkFileForUpdates, 60000);
	pingAll();
	setInterval(pingAll, PING_INTERVAL);
	// tikanie widgetov: hodiny každú sekundu, šprint sa prekreslí pri zmene dňa (polnoc)
	var wgDay = new Date().getDate();
	setInterval(function(){
		var dayNow = new Date().getDate();
		[].forEach.call(board.querySelectorAll(".tile.widget"), function(el){
			var l = state.links.find(function(x){ return x.id === el.dataset.id; });
			if(!l) return;
			if(l.kind === "clock" || dayNow !== wgDay) renderWidget(l, el.querySelector(".wg-body"));
		});
		wgDay = dayNow;
	}, 1000);
})();
</script>
<script>
// animované pozadie: pomalá sieť bodov so spojnicami, kreslená s alfou 30 %;
// canvas je fixne pod obsahom (pointer-events none), rAF sa pri skrytom tabe sám pozastaví
(function(){
	"use strict";
	var cv = document.getElementById("bgnet"), ctx = cv.getContext("2d");
	var ALPHA = 0.30;            // celková priehľadnosť efektu
	var DENSITY = 1 / 22000;     // ~1 bod na 22k px²
	var LINK_DIST = 150;         // max. dĺžka spojnice
	var SPEED = 0.25;            // px/snímka
	function accentRGB(){
		var v = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim();
		var m = /^#([0-9a-f]{6})$/i.exec(v);
		if(!m) return "91,140,255";
		var n = parseInt(m[1], 16);
		return (n>>16&255) + "," + (n>>8&255) + "," + (n&255);
	}
	var COLOR = accentRGB();
	// zmena akcentu v appke (picker / načítanie zo súboru) prefarbí sieť za behu
	window.FAVaccentChanged = function(){ COLOR = accentRGB(); };
	var pts = [], W = 0, H = 0;
	function resize(){
		var dpr = Math.min(window.devicePixelRatio || 1, 2);
		W = window.innerWidth; H = window.innerHeight;
		cv.width = W * dpr; cv.height = H * dpr;
		cv.style.width = W + "px"; cv.style.height = H + "px";
		ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
		var want = Math.round(W * H * DENSITY);
		while(pts.length < want) pts.push(spawn());
		pts.length = Math.min(pts.length, want);
	}
	function spawn(){
		var a = Math.random() * Math.PI * 2, v = SPEED * (0.5 + Math.random());
		return { x: Math.random()*W, y: Math.random()*H, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
		         r: 1 + Math.random()*1.5 };
	}
	function step(){
		ctx.clearRect(0, 0, W, H);
		ctx.globalAlpha = ALPHA;
		for(var i=0;i<pts.length;i++){
			var p = pts[i];
			p.x += p.vx; p.y += p.vy;
			if(p.x < 0 || p.x > W) p.vx = -p.vx;
			if(p.y < 0 || p.y > H) p.vy = -p.vy;
		}
		for(var i=0;i<pts.length;i++){
			for(var j=i+1;j<pts.length;j++){
				var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
				var d2 = dx*dx + dy*dy;
				if(d2 > LINK_DIST*LINK_DIST) continue;
				var k = 1 - Math.sqrt(d2) / LINK_DIST;
				ctx.strokeStyle = "rgba(" + COLOR + "," + (k * 0.55) + ")";
				ctx.lineWidth = 1;
				ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
			}
		}
		for(var i=0;i<pts.length;i++){
			var p = pts[i];
			ctx.fillStyle = "rgba(" + COLOR + ",0.9)";
			ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
		}
		requestAnimationFrame(step);
	}
	window.addEventListener("resize", resize);
	resize();
	requestAnimationFrame(step);
})();
</script>
